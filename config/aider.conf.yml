# Aider configuration for ServiceNow local agent
# Targets local Ollama inference — no cloud API calls

# RAG proxy — intercepts requests, injects retrieved context, forwards to Ollama
# Direct Ollama fallback: http://localhost:11434/v1
openai-api-base: http://localhost:8766/v1
openai-api-key: ollama  # ignored by proxy/Ollama but Aider requires a value

# Phase 1 winner: DeepSeek-Coder-V2-Lite (~11s vs Qwen 32B which was unusably slow)
# Qwen 32B benched — 19GB barely fits in 24GB, memory bandwidth kills it
model: deepseek-coder-v2:16b-lite-instruct-q4_K_M

# Editor model — same model for now, revisit if a lighter option makes sense
editor-model: deepseek-coder-v2:16b-lite-instruct-q4_K_M

# Aider behavior
auto-commits: false       # explicit git control
dirty-commits: false
suggest-shell-commands: false

# Always load system prompt for ServiceNow context
read: config/system-prompt.md
